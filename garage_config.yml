data_path: /Users/grant/tmp/garage-images
bin_factor: 4
cache_dir_name: binned
image_discovery:
  force_rescan_images: false
features:
  force_recompute_features: false
  max_images: null
  door_profile_rotate_cw_deg: -1.0
  car_profile_rotate_cw_deg: 40.0
  car_profile_max_masked_fraction: 0.25
  door_profile_max_masked_fraction: 0.25
general_change:
  model_path: garage_general_pca.pkl
  interesting_pc4_threshold: -26.0
  interesting_pc5_threshold: -50.0
rois:
  door:
  - 502
  - 100
  - 552
  - 375
  gap_or_outside:
  - 450
  - 275
  - 550
  - 375
  wall:
  - 960
  - 460
  - 1020
  - 350
  car_window:
  - 80
  - 400
  - 180
  - 480
  car_door:
  - 100
  - 500
  - 200
  - 600
conclusions:
  garage_door_open:
    feature: door_line_resid_ssq
    threshold: 110.0
    higher_means_true: false
  car_present:
    feature: car_line_resid_ssq
    threshold: 600.0
    higher_means_true: true
  interesting_image:
    feature: interesting_image_flag
    threshold: 0.5
    higher_means_true: true
automation:
  state_path: garage_status.json
  event_log_path: garage_events.jsonl
  html_status_path: garage_status.html
  latest_binned_image_path: garage_latest_binned.png
  notification_log_path: garage_notifications.jsonl
  notifications:
    enabled: true
    provider: ntfy
    url_env: GARAGE_NTFY_URL
    title: Garage
    tags:
    - garage
  transitions:
    garage_door_open:
      false_to_true:
        enabled: true
        message: Garage door opened.
      true_to_false:
        enabled: true
        message: Garage door closed.
    car_present:
      true_to_false:
        enabled: true
        message: Car left the garage.
      false_to_true:
        enabled: true
        message: Car is back in the garage.
  interesting_image_event:
    enabled: true
    message: Interesting garage image detected.
  scheduled_checks:
  - name: garage_open_evening
    at: '20:00'
    enabled: true
    condition:
      garage_door_open: true
    message: Garage door is still open.
  recent_events_limit: 5
